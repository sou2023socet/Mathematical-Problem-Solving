name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04 # <--- CHANGED FROM ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gluon GraalVM Compiler
        run: |
          cd ~
          wget https://github.com/gluonhq/graal/releases/download/gluon-22.1.0.1-Final/graalvm-svm-java17-linux-gluon-22.1.0.1-Final.tar.gz
          tar -xzf graalvm-svm-java17-linux-gluon-22.1.0.1-Final.tar.gz
          echo "GRAALVM_HOME=$HOME/graalvm-svm-java17-linux-gluon-22.1.0.1-Final" >> $GITHUB_ENV

      - name: Build Android Package with Maven
        working-directory: maths_arithimatic_opration/maths_number_properties/mathapp
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk-bundle
        run: mvn clean -Dgluonfx.target=android gluonfx:build gluonfx:package

      - name: Print Gluon Error Logs on Failure
        if: failure()
        run: |
          echo "=== GLUON ERROR LOGS ==="
          cat maths_arithimatic_opration/maths_number_properties/mathapp/target/gluonfx/log/*.log || true

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: mathapp-android-apk
          path: "maths_arithimatic_opration/maths_number_properties/mathapp/target/gluonfx/aarch64-android/gvm/*.apk"
